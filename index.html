<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montazer Stocks</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📈 Montazer Stocks</h1>
  <p>تابع أسعار الأسهم العالمية بسهولة</p>
</header>

<section class="search-box">
  <input type="text" id="search" placeholder="ابحث عن سهم...">
  <button>بحث</button>
</section>

<section class="stocks">

  <div class="card">
    <h2>Apple (AAPL)</h2>
    <p class="price">$210.45</p>
    <span class="up">▲ +1.82%</span>
  </div>

  <div class="card">
    <h2>Tesla (TSLA)</h2>
    <p class="price">$318.17</p>
    <span class="down">▼ -0.91%</span>
  </div>

  <div class="card">
    <h2>NVIDIA (NVDA)</h2>
    <p class="price">$174.88</p>
    <span class="up">▲ +2.34%</span>
  </div>

</section>

<footer>
  <p>© 2026 Montazer Stocks</p>
</footer>

<script src="script.js"></script>

</body>
</html>
